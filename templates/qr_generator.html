{% extends "base.html" %}
{% block title %}Smart QR Attendance{% endblock %}
{% block page_title %}Smart QR Generator{% endblock %}

{% block content %}
<div class="dashboard-grid" style="grid-template-columns: 1fr; background: transparent; padding: 0; box-shadow: none;">
    <div class="card" style="max-width: 600px; margin: 0 auto; text-align: center;">
        <h2 style="margin-bottom: 24px; color: var(--primary-color);">Generate Session QR</h2>
        
        <div class="form-group" style="text-align: left;">
            <label for="subject_id">Select Subject</label>
            <select name="subject_id" id="subject_id" class="form-control" required>
                <option value="" disabled selected>-- Select Subject --</option>
                {% for subject in subjects %}
                    <option value="{{ subject.id }}">{{ subject.code }} - {{ subject.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button id="generateBtn" class="btn btn-primary" style="margin-top: 16px; width: 100%;">
            <i class="fa-solid fa-qrcode"></i> Generate Live QR
        </button>

        <div id="qrContainer" style="display: none; margin-top: 32px;">
            <div id="qrcode" style="display: flex; justify-content: center; padding: 16px; background: white; border-radius: 12px; margin-bottom: 16px;"></div>
            <p id="qrUrlText" style="font-size: 0.85rem; color: var(--text-muted); word-break: break-all; margin-bottom: 12px;"></p>
            
            <div style="display: inline-flex; align-items: center; gap: 8px; font-weight: 600; color: #E2CF87;">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Refreshes in <span id="countdown">60</span>s</span>
            </div>
            
            <!-- Progress bar -->
            <div style="width: 100%; height: 6px; background-color: var(--border-color); border-radius: 6px; margin-top: 12px; overflow: hidden;">
                <div id="progressBar" style="height: 100%; width: 100%; background-color: #E2CF87; transition: width 1s linear;"></div>
            </div>
        </div>
    </div>

    <!-- Live Check-in Feed -->
    <div id="liveFeedContainer" class="card" style="max-width: 600px; margin: 24px auto 0; display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 style="margin: 0;"><i class="fa-solid fa-signal-stream" style="color: #ef4444; animation: pulse 1.5s infinite;"></i> Live Check-ins</h3>
            <div id="liveCounter" style="background: var(--primary-color); color: white; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;">0 Students</div>
        </div>
        <div id="checkinList" style="display: flex; flex-direction: column; gap: 10px;">
            <!-- Check-ins will appear here -->
            <p id="noCheckinsText" style="text-align: center; color: var(--text-muted); padding: 20px 0;">Waiting for first scan...</p>
        </div>
    </div>
</div>

<style>
@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}
.checkin-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(var(--primary-rgb), 0.05);
    padding: 10px 16px;
    border-radius: 8px;
    border-left: 3px solid var(--primary-color);
    animation: slideIn 0.3s ease-out;
}
@keyframes slideIn {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
</style>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    const generateBtn = document.getElementById('generateBtn');
    const subjectSelect = document.getElementById('subject_id');
    const qrContainer = document.getElementById('qrContainer');
    const countdownEl = document.getElementById('countdown');
    const progressBar = document.getElementById('progressBar');
    const qrUrlText = document.getElementById('qrUrlText');
    
    let qrCode = null;
    let refreshInterval = null;
    let countdownInterval = null;
    let timeLeft = 60;

    function formatUrlToDisplay(url) {
        return url;
    }

    async function fetchQRToken() {
        const subjectId = subjectSelect.value;
        if (!subjectId) return;

        try {
            const formData = new FormData();
            formData.append('subject_id', subjectId);
            
            const response = await fetch("{{ url_for('generate_qr_token') }}", {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            
            if (data.url) {
                // Clear previous
                document.getElementById('qrcode').innerHTML = "";
                qrCode = new QRCode(document.getElementById("qrcode"), {
                    text: data.url,
                    width: 256,
                    height: 256,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
                qrUrlText.textContent = data.url;
                resetCountdown();
                qrContainer.style.display = 'block';
            }
        } catch (e) {
            console.error("Error fetching QR token:", e);
        }
    }

    function resetCountdown() {
        timeLeft = 60;
        countdownEl.textContent = timeLeft;
        progressBar.style.width = "100%";
        
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            progressBar.style.width = `${(timeLeft / 60) * 100}%`;
            
            if (timeLeft <= 0) {
                // Time will be handled by fetchQRToken interval shortly 
                // Or we could trigger fetchQRToken() here directly
            }
        }, 1000);
    }

    generateBtn.addEventListener('click', () => {
        if (!subjectSelect.value) {
            alert('Please select a subject first.');
            return;
        }
        
        fetchQRToken();
        
        // Refresh every 59 seconds to ensure no overlap
        clearInterval(refreshInterval);
        refreshInterval = setInterval(fetchQRToken, 59000);

        // Start Live Feed
        document.getElementById('liveFeedContainer').style.display = 'block';
        startLiveFeed();
    });

    let liveFeedInterval = null;
    let knownCheckins = new Set();

    async function startLiveFeed() {
        const subjectId = subjectSelect.value;
        if (!subjectId) return;

        clearInterval(liveFeedInterval);
        liveFeedInterval = setInterval(async () => {
            try {
                const response = await fetch(`/api/recent_checkins/${subjectId}`);
                const data = await response.json();
                
                document.getElementById('liveCounter').textContent = `${data.count} Students`;
                
                const list = document.getElementById('checkinList');
                const noCheckinsText = document.getElementById('noCheckinsText');
                
                if (data.recent.length > 0) {
                    if (noCheckinsText) noCheckinsText.remove();
                    
                    data.recent.forEach(item => {
                        const key = `${item.name}-${item.roll}`;
                        if (!knownCheckins.has(key)) {
                            knownCheckins.add(key);
                            
                            const div = document.createElement('div');
                            div.className = 'checkin-item';
                            div.innerHTML = `
                                <div>
                                    <strong style="display: block;">${item.name}</strong>
                                    <small style="color: var(--text-muted);">${item.roll}</small>
                                </div>
                                <span style="font-size: 0.8rem; color: #10B981; font-weight: 600;">
                                    <i class="fa-solid fa-check-circle"></i> ${item.time}
                                </span>
                            `;
                            list.prepend(div);
                            
                            // Keep list short
                            if (list.children.length > 5) {
                                list.removeChild(list.lastChild);
                            }
                        }
                    });
                }
            } catch (e) {
                console.error("Live feed error:", e);
            }
        }, 3000);
    }
</script>
{% endblock %}
