{% extends 'base.html' %}
{% block title %}Attendance{% endblock %}
{% block page_title %}Automated Attendance{% endblock %}

{% block content %}
<div class="card" style="margin-bottom: 24px;">
    <h3><i class="fa-solid fa-clipboard-user" style="color: var(--primary-color);"></i> Mark Attendance</h3>
    <form method="POST" action="{{ url_for('attendance') }}">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; margin-top: 16px;">
            <div class="form-group">
                <label for="subject_id">Select Subject</label>
                <select name="subject_id" id="subject_id" class="form-control" required>
                    <option value="">-- Choose Subject --</option>
                    {% for subject in subjects %}
                    <option value="{{ subject.id }}">{{ subject.name }} ({{ subject.code }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="date">Class Date</label>
                <input type="date" name="date" id="date" class="form-control" value="{{ today }}" required>
            </div>
        </div>

        <table class="styled-table">
            <thead>
                <tr>
                    <th>Roll Number</th>
                    <th>Student Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.roll_number }}</td>
                    <td>{{ student.name }}</td>
                    <td>
                        <div style="display: flex; gap: 16px; align-items: center;">
                            <label style="cursor: pointer; display: flex; align-items: center; gap: 6px;">
                                <input type="radio" name="status_{{ student.id }}" value="Present" checked style="accent-color: #10B981; width: 18px; height: 18px;">
                                <span style="font-weight: 500; color: #10B981;">Present</span>
                            </label>
                            <label style="cursor: pointer; display: flex; align-items: center; gap: 6px;">
                                <input type="radio" name="status_{{ student.id }}" value="Absent" style="accent-color: #ef4444; width: 18px; height: 18px;">
                                <span style="font-weight: 500; color: #ef4444;">Absent</span>
                            </label>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        
        <div style="margin-top: 24px; text-align: right;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check" style="margin-right: 8px;"></i> Submit Attendance</button>
        </div>
    </form>
</div>
{% endblock %}
